server:
  port: 8080

spring:
  application:
    name: kidscoding-server

  datasource:
    url: jdbc:mysql://localhost:3306/kidscoding?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: lsl123
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置（替代 JPA 的 hibernate 配置）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL 日志
    map-underscore-to-camel-case: true                      # 下划线转驼峰（password_hash → passwordHash）
  global-config:
    db-config:
      id-type: assign_id        # 全局主键策略：雪花算法
      logic-delete-field: deleted  # 全局逻辑删除字段
      logic-delete-value: 1        # 已删除
      logic-not-delete-value: 0    # 未删除

# JWT 配置
jwt:
  secret: KidsCoding2026SecretKeyForJWTTokenGenerationMustBeLongEnough  # 密钥（生产环境要从环境变量读取）
  expiration: 86400000    # Token 有效期：24小时（毫秒）
